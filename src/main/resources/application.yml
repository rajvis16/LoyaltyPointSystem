spring:
  datasource:
    url: jdbc:h2:mem:loyaltydb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    defer-datasource-initialization: true
    open-in-view: false

  # 💡 THE ULTIMATE FIX: Tells the DispatcherServlet to allow infrastructure servlets to map cleanly
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

server:
  servlet:
    register-default-servlet: true